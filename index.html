<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>World Cup Bracket</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-api-base="https://world-cup-bracket-api.dissidentdesign.workers.dev">
    <main class="app-shell">
      <section class="bracket-stage" aria-label="World Cup knockout bracket">
        <header class="top-bar">
          <div>
            <p class="eyebrow">FIFA World Cup 2026</p>
            <h1>Knockout Map</h1>
          </div>
          <div class="status-panel" aria-live="polite">
            <span class="status-dot"></span>
            <span id="tournament-status">Rounded knockout bracket</span>
            <span id="live-status" class="live-status" data-state="offline">Seeded data</span>
          </div>
        </header>

        <div class="bracket-wrap">
          <div class="round-labels" id="round-labels" aria-hidden="true"></div>
          <svg class="bracket-lines" id="bracket-lines" aria-hidden="true"></svg>
          <div class="team-layer" id="team-layer"></div>
        </div>
      </section>

      <aside class="team-panel" id="team-panel" aria-live="polite">
        <div class="empty-state">
          <span class="empty-ball">⚽</span>
          <h2>Pick a team</h2>
          <p>Select any country flag around the bracket to see form, key stats, the next match, venue, and U.S. viewing options.</p>
        </div>
      </aside>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
